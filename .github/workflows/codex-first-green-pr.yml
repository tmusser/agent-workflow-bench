name: Codex first-green checkpoints PR

on:
  push:
    branches:
      - feature/codex-first-green-checkpoints
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Apply deterministic integration patches
        run: |
          python .github/scripts/apply_codex_first_green_patch.py
          python .github/scripts/harden_codex_first_green_patch.py

      - name: Run focused first-green tests
        run: |
          set +e
          python -m pytest \
            benchmark_harness/tests/test_codex_solution_latency_observer.py \
            benchmark_harness/tests/test_codex_solution_latency_e2e.py \
            benchmark_harness/tests/test_agent_turn_trace.py \
            benchmark_harness/tests/test_solution_latency_observer.py \
            benchmark_harness/tests/test_scorecard.py \
            -q --tb=short > /tmp/focused-tests.log 2>&1
          code=$?
          cat /tmp/focused-tests.log
          exit "$code"

      - name: Report focused-test failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo 'Focused Codex first-green tests failed:'
            echo
            echo '```text'
            tail -160 /tmp/focused-tests.log
            echo '```'
          } > /tmp/failure-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/failure-comment.md

      - name: Run full harness tests
        run: python -m pytest benchmark_harness/tests -q

      - name: Validate shell and diff hygiene
        run: |
          bash -n tools/pilot_codex_smoke.sh tools/pilot_smoke.sh tools/pilot_smoke_legacy.sh
          git diff --check

      - name: Commit final branch state
        if: github.event_name == 'push'
        run: |
          rm -f .github/scripts/apply_codex_first_green_patch.py
          rm -f .github/scripts/harden_codex_first_green_patch.py
          rm -f .github/workflows/codex-first-green-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Observe exact Codex first-green workspace state"
          git push origin HEAD:feature/codex-first-green-checkpoints
