name: Claude observability parity v0.2.0

on:
  push:
    branches:
      - feature/claude-observability-parity-v020
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Apply deterministic integration patch
        run: python .github/scripts/apply_claude_parity_v020.py

      - name: Run focused parity tests
        run: |
          set +e
          python -m pytest \
            benchmark_harness/tests/test_claude_solution_latency_parity.py \
            benchmark_harness/tests/test_capability_scorecard.py \
            benchmark_harness/tests/test_solution_latency_observer.py \
            benchmark_harness/tests/test_codex_solution_latency_observer.py \
            benchmark_harness/tests/test_codex_solution_latency_e2e.py \
            benchmark_harness/tests/test_scorecard.py \
            -q --tb=short > /tmp/focused-tests.log 2>&1
          code=$?
          cat /tmp/focused-tests.log
          exit "$code"

      - name: Report focused-test failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo 'Claude parity focused tests failed:'
            echo
            echo '```text'
            tail -180 /tmp/focused-tests.log
            echo '```'
          } > /tmp/failure-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/failure-comment.md

      - name: Run full harness suite
        run: python -m pytest benchmark_harness/tests -q

      - name: Validate shell and diff hygiene
        run: |
          bash -n tools/pilot_smoke.sh tools/pilot_smoke_legacy.sh tools/pilot_codex_smoke.sh
          git diff --check

      - name: Verify release metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          assert data['project']['version'] == '0.2.0'
          readme = Path('README.md').read_text(encoding='utf-8')
          assert 'Version v0.2.0' in readme
          assert 'docs/capabilities.md' in readme
          assert Path('docs/capabilities.md').exists()
          PY

      - name: Commit final branch state
        if: github.event_name == 'push'
        run: |
          rm -f .github/scripts/apply_claude_parity_v020.py
          rm -f .github/workflows/claude-parity-v020-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Claude observability parity for v0.2.0"
          git push origin HEAD:feature/claude-observability-parity-v020
