name: Codex first-green review fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/codex-first-green-checkpoints
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Apply review fixes
        run: |
          set +e
          python .github/scripts/fix_codex_first_green_review.py > /tmp/review-fix.log 2>&1
          code=$?
          cat /tmp/review-fix.log
          exit "$code"

      - name: Report patch failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo 'Codex first-green review patch failed:'
            echo
            echo '```text'
            tail -120 /tmp/review-fix.log
            echo '```'
          } > /tmp/failure-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/failure-comment.md

      - name: Run focused tests
        run: >-
          python -m pytest
          benchmark_harness/tests/test_codex_solution_latency_observer.py
          benchmark_harness/tests/test_codex_solution_latency_e2e.py
          benchmark_harness/tests/test_agent_turn_trace.py
          benchmark_harness/tests/test_solution_latency_observer.py
          benchmark_harness/tests/test_scorecard.py
          -q

      - name: Run full harness tests
        run: python -m pytest benchmark_harness/tests -q

      - name: Validate shell and diff hygiene
        run: |
          bash -n tools/pilot_codex_smoke.sh tools/pilot_smoke.sh tools/pilot_smoke_legacy.sh
          git diff --check

      - name: Commit final branch state
        run: |
          rm -f .github/scripts/fix_codex_first_green_review.py
          rm -f .github/workflows/codex-first-green-review-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden Codex first-green checkpoint semantics"
          git push origin HEAD:feature/codex-first-green-checkpoints
