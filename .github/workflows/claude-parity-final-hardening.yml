name: Claude parity final hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  harden-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/claude-observability-parity-v020
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Apply final hardening
        run: python .github/scripts/harden_claude_parity_final.py

      - name: Run focused parity tests
        run: >-
          python -m pytest
          benchmark_harness/tests/test_claude_solution_latency_parity.py
          benchmark_harness/tests/test_capability_scorecard.py
          benchmark_harness/tests/test_solution_latency_observer.py
          benchmark_harness/tests/test_codex_solution_latency_observer.py
          benchmark_harness/tests/test_codex_solution_latency_e2e.py
          benchmark_harness/tests/test_scorecard.py
          -q

      - name: Run full harness suite
        run: python -m pytest benchmark_harness/tests -q

      - name: Validate shell and diff hygiene
        run: |
          bash -n tools/pilot_smoke.sh tools/pilot_smoke_legacy.sh tools/pilot_codex_smoke.sh
          git diff --check

      - name: Commit final branch state
        run: |
          rm -f .github/scripts/harden_claude_parity_final.py
          rm -f .github/workflows/claude-parity-final-hardening.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden Claude first-green coverage semantics"
          git push origin HEAD:feature/claude-observability-parity-v020
